<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="講義まとめAI">
<title>講義まとめAI</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root,[data-theme=light]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--surface-off:#f3f0ec;
  --border:#d4d1ca;--divider:#dcd9d5;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;--primary-hl:#cedcd8;
  --ok:#437a22;--ok-hl:#d4dfcc;--err:#a12c7b;--err-hl:#e0ced7;
  --sh-sm:0 1px 2px oklch(0.2 0.01 80/.06);
  --sh-md:0 4px 12px oklch(0.2 0.01 80/.08);
  --sh-lg:0 12px 32px oklch(0.2 0.01 80/.12);
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
  --font:'Satoshi','Helvetica Neue',sans-serif;
  --xs:clamp(.75rem,.7rem + .25vw,.875rem);--sm:clamp(.875rem,.8rem + .35vw,1rem);
  --base:clamp(1rem,.95rem + .25vw,1.125rem);--lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s10:2.5rem;
  --ease:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme=dark]{
  --bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--surface-off:#1d1c1a;
  --border:#393836;--divider:#262523;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#313b3b;
  --ok:#6daa45;--ok-hl:#3a4435;--err:#d163a7;--err-hl:#4c3d46;
  --sh-sm:0 1px 2px oklch(0 0 0/.2);--sh-md:0 4px 12px oklch(0 0 0/.3);--sh-lg:0 12px 32px oklch(0 0 0/.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--font);font-size:var(--base);color:var(--text);background:var(--bg);line-height:1.6}
svg,img{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,textarea{font:inherit;color:inherit}
button,input{transition:color var(--ease),background var(--ease),border-color var(--ease),box-shadow var(--ease)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--r-sm)}
.hidden{display:none!important}
#setup{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:var(--s6)}
.setup-card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:var(--s8);box-shadow:var(--sh-lg);display:flex;flex-direction:column;gap:var(--s5)}
.setup-logo{display:flex;align-items:center;justify-content:center;gap:var(--s3)}
.setup-logo svg{color:var(--primary)}
.setup-logo span{font-size:var(--lg);font-weight:700}
.setup-desc{font-size:var(--sm);color:var(--muted);text-align:center;line-height:1.7}
.field{display:flex;flex-direction:column;gap:var(--s2)}
.field label{font-size:var(--sm);font-weight:500}
.field input{width:100%;padding:var(--s3) var(--s4);border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface2);font-size:var(--base)}
.field input:focus{outline:2px solid var(--primary);outline-offset:0;border-color:transparent}
.err-msg{font-size:var(--sm);color:var(--err);background:var(--err-hl);padding:var(--s3);border-radius:var(--r-md);text-align:center;display:none}
.btn-start{width:100%;padding:var(--s3) var(--s4);background:var(--primary);color:#fff;font-size:var(--base);font-weight:700;border-radius:var(--r-md)}
.btn-start:hover{background:var(--primary-h)}
.key-hint{font-size:var(--xs);color:var(--faint);text-align:center;line-height:1.6}
.key-hint a{color:var(--primary);text-decoration:none}
#app{display:flex;flex-direction:column;min-height:100dvh}
.hdr{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);padding:var(--s4) var(--s5);display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh-sm)}
.hdr-logo{display:flex;align-items:center;gap:var(--s3)}
.hdr-logo svg{color:var(--primary)}
.hdr-logo span{font-size:var(--base);font-weight:700}
.hdr-btns{display:flex;align-items:center;gap:var(--s2)}
.key-badge{display:flex;align-items:center;gap:var(--s2);font-size:var(--xs);color:var(--muted);background:var(--surface-off);border:1px solid var(--border);border-radius:var(--r-full);padding:var(--s1) var(--s3)}
.key-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0}
.ico-btn{width:40px;height:40px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;color:var(--muted);position:relative}
.ico-btn:hover{background:var(--surface-off);color:var(--text)}
.hist-badge{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--primary);display:none}
.page{display:none;flex-direction:column;flex:1}
.page.active{display:flex}
main{padding:var(--s5);max-width:600px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:var(--s5)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--sh-sm)}
.card-hdr{padding:var(--s4) var(--s5);border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:var(--s3)}
.card-icon{width:36px;height:36px;flex-shrink:0;background:var(--primary-hl);color:var(--primary);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center}
.card-title{font-size:var(--sm);font-weight:700}
.card-sub{font-size:var(--xs);color:var(--muted);margin-top:2px}
.card-body{padding:var(--s5)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r-lg);padding:var(--s8) var(--s5);background:var(--surface2);display:flex;flex-direction:column;align-items:center;gap:var(--s3);cursor:pointer;text-align:center;transition:border-color var(--ease),background var(--ease)}
.drop-zone:hover,.drop-zone.over{border-color:var(--primary);background:var(--primary-hl)}
.drop-zone svg{color:var(--faint);transition:color var(--ease)}
.drop-zone:hover svg,.drop-zone.over svg{color:var(--primary)}
.dz-label{font-size:var(--sm);font-weight:500;color:var(--muted)}
.dz-hint{font-size:var(--xs);color:var(--faint)}
input[type=file]{display:none}
.pill{display:flex;align-items:center;gap:var(--s3);background:var(--surface-off);border:1px solid var(--border);border-radius:var(--r-full);padding:var(--s2) var(--s4);margin-top:var(--s3)}
.pill svg{color:var(--primary);flex-shrink:0}
.pill-name{font-size:var(--sm);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-size{font-size:var(--xs);color:var(--faint);flex-shrink:0;}
.pill-rm{color:var(--faint);padding:var(--s1);border-radius:var(--r-full);flex-shrink:0}
.pill-rm:hover{color:var(--err);background:var(--err-hl)}
.opt-div{display:flex;align-items:center;justify-content:center;gap:var(--s2);color:var(--faint);font-size:var(--xs)}
.opt-div::before,.opt-div::after{content:'';flex:1;height:1px;background:var(--divider)}

/* ── 要約レベルセレクター ── */
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)}
.level-btn{display:flex;flex-direction:column;gap:4px;padding:var(--s4);background:var(--surface2);border:2px solid var(--border);border-radius:var(--r-lg);text-align:left;transition:border-color var(--ease),background var(--ease),box-shadow var(--ease);cursor:pointer}
.level-btn:hover{border-color:var(--primary);background:var(--primary-hl)}
.level-btn.active{border-color:var(--primary);background:var(--primary-hl);box-shadow:var(--sh-sm)}
.level-btn .lv-icon{font-size:1.3rem;line-height:1}
.level-btn .lv-name{font-size:var(--sm);font-weight:700;color:var(--text)}
.level-btn .lv-desc{font-size:var(--xs);color:var(--muted);line-height:1.4}
.level-btn .lv-tokens{font-size:var(--xs);color:var(--faint);margin-top:2px}

/* ── 科目タグ ── */
.subject-field{display:flex;flex-direction:column;gap:var(--s2);margin-top:var(--s4)}
.subject-field label{font-size:var(--sm);font-weight:500;color:var(--muted)}
.subject-field input{width:100%;padding:var(--s3) var(--s4);border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface2);font-size:var(--sm)}
.subject-field input:focus{outline:2px solid var(--primary);outline-offset:0;border-color:transparent}

.run-btn{width:100%;padding:var(--s4);background:var(--primary);color:#fff;font-size:var(--base);font-weight:700;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;gap:var(--s3)}
.run-btn:hover:not(:disabled){background:var(--primary-h)}
.run-btn:disabled{opacity:.45;cursor:not-allowed}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-wrap{background:var(--surface-off);border-radius:var(--r-full);height:6px;overflow:hidden;margin-top:var(--s4);display:none}
.prog-bar{height:100%;background:var(--primary);width:0%;transition:width .4s ease}
.prog-lbl{font-size:var(--xs);color:var(--muted);text-align:center;margin-top:var(--s2);display:none}

/* ── エラーカード ── */
.err-card{background:var(--err-hl);border:1px solid var(--err);border-radius:var(--r-lg);padding:var(--s4) var(--s5);display:flex;align-items:flex-start;gap:var(--s3);font-size:var(--sm);color:var(--err);margin-top:var(--s4);}
.err-card-msg{flex:1;line-height:1.5}
.err-card-close{flex-shrink:0;color:var(--err);opacity:.7;padding:2px;border-radius:var(--r-sm)}
.err-card-close:hover{opacity:1;background:var(--err-hl)}

.result-card{display:none;flex-direction:column;gap:var(--s4)}
.tabs{display:flex;gap:var(--s1);background:var(--surface-off);border-radius:var(--r-lg);padding:var(--s1)}
.tab{flex:1;padding:var(--s2) var(--s3);border-radius:var(--r-md);font-size:var(--sm);font-weight:500;color:var(--muted);text-align:center;cursor:pointer}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--sh-sm);font-weight:700}
.pane
